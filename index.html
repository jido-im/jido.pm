<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;background:#f5f4f0;color:#1a1a18;min-height:100vh}
.app{max-width:960px;margin:0 auto;padding:24px 16px}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.logo{font-size:18px;font-weight:600;color:#1a1a18;letter-spacing:-.02em}
.logo span{color:#378ADD}
.sync-bar{display:flex;align-items:center;gap:8px}
.sync-status{font-size:12px;color:#aaa}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#ccc;display:inline-block;margin-right:4px}
.sync-dot.ok{background:#1D9E75}
.sync-dot.syncing{background:#EF9F27;animation:pulse 1s infinite}
.sync-dot.error{background:#E24B4A}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.btn-signin{font-size:12px;padding:6px 12px;border:1px solid #378ADD;border-radius:7px;background:none;cursor:pointer;color:#378ADD;font-family:inherit;font-weight:500}
.btn-signin:hover{background:#E6F1FB}
.btn-signout{font-size:12px;padding:6px 12px;border:1px solid #ddd;border-radius:7px;background:none;cursor:pointer;color:#888;font-family:inherit}
.topbar{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.tabs{display:flex;gap:3px;background:#e8e6e0;padding:3px;border-radius:8px}
.tab{padding:7px 16px;font-size:13px;font-family:inherit;border:none;background:none;cursor:pointer;border-radius:6px;color:#666;font-weight:500;transition:all .15s}
.tab.active{background:#fff;color:#1a1a18;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.tab:hover:not(.active){color:#1a1a18}
.btn-add{margin-left:auto;font-size:13px;padding:8px 14px;border:1.5px solid #d0cec8;border-radius:8px;background:#fff;cursor:pointer;color:#444;font-family:inherit;font-weight:500;transition:all .15s}
.btn-add:hover{background:#f0ede8}
.view{display:none}
.view.active{display:block}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px}
.stat{background:#fff;border-radius:10px;padding:12px 14px;border:1px solid #e8e6e0;text-align:center}
.stat-num{font-size:22px;font-weight:600;color:#1a1a18}
.stat-label{font-size:11px;color:#aaa;margin-top:2px;font-weight:500}
.stat-num.blue{color:#378ADD}
.stat-num.amber{color:#EF9F27}
.stat-num.green{color:#1D9E75}
.board{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
@media(max-width:720px){.board{grid-template-columns:repeat(2,1fr)}}
.col{background:#eceae4;border-radius:12px;padding:12px}
.col-head{font-size:11px;font-weight:600;color:#888;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;text-transform:uppercase;letter-spacing:.06em}
.col-count{background:#fff;border-radius:10px;padding:1px 7px;font-size:11px;color:#666}
.card{background:#fff;border:1px solid #e8e6e0;border-radius:10px;padding:11px 13px;margin-bottom:8px;cursor:pointer;transition:all .15s}
.card:last-child{margin-bottom:0}
.card:hover{border-color:#b0c8e8;box-shadow:0 2px 8px rgba(55,138,221,.1)}
.card-title{font-size:13px;font-weight:500;color:#1a1a18;margin-bottom:7px;line-height:1.45}
.card-meta{display:flex;justify-content:space-between;align-items:center;gap:6px}
.tag{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600;flex-shrink:0}
.tag-design{background:#EEEDFE;color:#3C3489}
.tag-dev{background:#E1F5EE;color:#085041}
.tag-review{background:#FAEEDA;color:#633806}
.tag-done{background:#EAF3DE;color:#27500A}
.tag-etc{background:#f0ede8;color:#555}
.due{font-size:11px;color:#aaa}
.prio-dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:5px;flex-shrink:0}
.p-high{background:#E24B4A}
.p-mid{background:#EF9F27}
.p-low{background:#1D9E75}
.list-view{display:flex;flex-direction:column;gap:6px}
.task-row{display:flex;align-items:center;gap:12px;padding:11px 14px;background:#fff;border-radius:10px;border:1px solid #e8e6e0;cursor:pointer;transition:all .15s}
.task-row:hover{border-color:#b0c8e8}
.check{width:17px;height:17px;border:1.5px solid #ccc;border-radius:5px;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
.check.done{background:#1D9E75;border-color:#1D9E75;color:#fff;font-size:10px}
.task-name{flex:1;font-size:13px;color:#1a1a18}
.task-name.done{text-decoration:line-through;color:#aaa}
.task-date{font-size:12px;color:#aaa;flex-shrink:0}
.cal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.cal-month{font-size:16px;font-weight:600;color:#1a1a18}
.cal-nav{display:flex;gap:6px}
.nav-btn{width:30px;height:30px;border:1px solid #ddd;background:#fff;border-radius:8px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;color:#555;transition:all .15s}
.nav-btn:hover{background:#f0ede8}
.grid-labels{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:3px}
.day-label{font-size:11px;font-weight:600;text-align:center;color:#aaa;padding:5px 0;letter-spacing:.04em}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.day{min-height:76px;background:#fff;border-radius:8px;padding:6px;border:1px solid #ece9e3;cursor:pointer;transition:border-color .15s}
.day:hover{border-color:#b0c8e8}
.day.other-month{background:#f5f4f0;opacity:.5}
.day.today{border-color:#378ADD}
.day.today .day-num{background:#378ADD;color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center}
.day-num{font-size:12px;font-weight:500;color:#1a1a18;width:22px;height:22px;display:flex;align-items:center;justify-content:center;margin-bottom:3px}
.day.other-month .day-num{color:#bbb}
.event{font-size:10px;padding:2px 5px;border-radius:4px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.ev-blue{background:#E6F1FB;color:#185FA5}
.ev-purple{background:#EEEDFE;color:#3C3489}
.ev-green{background:#EAF3DE;color:#27500A}
.ev-amber{background:#FAEEDA;color:#633806}
.more-label{font-size:10px;color:#aaa;padding-left:4px}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:14px;padding:22px;width:340px;max-width:92vw;box-shadow:0 8px 40px rgba(0,0,0,.15)}
.modal h3{font-size:15px;font-weight:600;margin-bottom:16px;color:#1a1a18}
.field{margin-bottom:11px}
.field label{font-size:12px;color:#888;display:block;margin-bottom:4px;font-weight:500}
.field input,.field select,.field textarea{width:100%;font-size:13px;padding:8px 10px;border:1px solid #ddd;border-radius:8px;background:#fafaf8;color:#1a1a18;font-family:inherit;outline:none;transition:border-color .15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:#378ADD}
.field textarea{resize:vertical;min-height:60px}
.modal-btns{display:flex;justify-content:space-between;align-items:center;margin-top:18px}
.btn-delete{font-size:12px;padding:7px 12px;border:1px solid #ffd0d0;border-radius:8px;background:none;cursor:pointer;color:#E24B4A;font-family:inherit}
.btn-delete:hover{background:#fff0f0}
.btn-right{display:flex;gap:8px}
.btn-cancel{font-size:13px;padding:8px 14px;border:1px solid #ddd;border-radius:8px;background:none;cursor:pointer;color:#666;font-family:inherit}
.btn-cancel:hover{background:#f5f4f0}
.btn-save{font-size:13px;padding:8px 16px;border:none;border-radius:8px;background:#378ADD;color:#fff;cursor:pointer;font-family:inherit;font-weight:600}
.btn-save:hover{background:#2a6fb0}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a18;color:#fff;font-size:13px;padding:10px 18px;border-radius:10px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
</style>

<div class="app">
  <div class="header">
    <div class="logo">jido.<span> pm</span></div>
    <div class="sync-bar">
      <span class="sync-status"><span class="sync-dot" id="sync-dot"></span><span id="sync-text">로그인 필요</span></span>

    <div class="cal-header">
      <span class="cal-month" id="cal-month">2026년 5월</span>

    </div>
    <div class="cal-grid" id="cal-grid"><div class="day other-month"><div class="day-num">26</div></div><div class="day other-month"><div class="day-num">27</div></div><div class="day other-month"><div class="day-num">28</div></div><div class="day other-month"><div class="day-num">29</div></div><div class="day other-month"><div class="day-num">30</div></div><div class="day "><div class="day-num">1</div></div><div class="day "><div class="day-num">2</div></div><div class="day "><div class="day-num">3</div></div><div class="day "><div class="day-num">4</div></div><div class="day "><div class="day-num">5</div></div><div class="day "><div class="day-num">6</div></div><div class="day today"><div class="day-num">7</div></div><div class="day "><div class="day-num">8</div></div><div class="day "><div class="day-num">9</div></div><div class="day "><div class="day-num">10</div></div><div class="day "><div class="day-num">11</div></div><div class="day "><div class="day-num">12</div></div><div class="day "><div class="day-num">13</div></div><div class="day "><div class="day-num">14</div></div><div class="day "><div class="day-num">15</div></div><div class="day "><div class="day-num">16</div></div><div class="day "><div class="day-num">17</div></div><div class="day "><div class="day-num">18</div></div><div class="day "><div class="day-num">19</div></div><div class="day "><div class="day-num">20</div></div><div class="day "><div class="day-num">21</div></div><div class="day "><div class="day-num">22</div></div><div class="day "><div class="day-num">23</div></div><div class="day "><div class="day-num">24</div></div><div class="day "><div class="day-num">25</div></div><div class="day "><div class="day-num">26</div></div><div class="day "><div class="day-num">27</div></div><div class="day "><div class="day-num">28</div></div><div class="day "><div class="day-num">29</div></div><div class="day "><div class="day-num">30</div></div><div class="day "><div class="day-num">31</div></div><div class="day other-month"><div class="day-num">1</div></div><div class="day other-month"><div class="day-num">2</div></div><div class="day other-month"><div class="day-num">3</div></div><div class="day other-month"><div class="day-num">4</div></div><div class="day other-month"><div class="day-num">5</div></div><div class="day other-month"><div class="day-num">6</div></div></div>

<div class="overlay" id="overlay" onclick="closeOverlay(event)">
  <div class="modal">
    <h3 id="modal-title">새 작업 추가</h3>
    <div class="field"><label>작업 이름</label><input id="f-name" placeholder="작업 이름 입력..."></div>
    <div class="field"><label>메모</label><textarea id="f-memo" placeholder="메모 (선택)"></textarea></div>
    <div class="field"><label>상태</label>
      <select id="f-status">
        <option value="todo">할 일</option>
        <option value="doing">진행 중</option>
        <option value="review">검토</option>
        <option value="done">완료</option>
      </select>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="field"><label>태그</label>
        <select id="f-tag">
          <option value="design">디자인</option>
          <option value="dev">개발</option>

          <option value="done">완료</option>
          <option value="etc">기타</option>
        </select>
      </div>
      <div class="field"><label>우선순위</label>

          <option value="high">높음</option>
          <option value="mid">보통</option>
          <option value="low">낮음</option>
        </select>
      </div>

    <div class="field"><label>마감일</label><input id="f-due" type="date"></div>
    <div class="modal-btns">
      <button class="btn-delete" id="btn-delete" onclick="deleteTask()" style="visibility:hidden">삭제</button>
      <div class="btn-right">
        <button class="btn-cancel" onclick="closeModal()">취소</button>
        <button class="btn-save" onclick="saveTask()">저장</button>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script src="./jido. project manager_files/client" async="" defer=""></script>
<script>
const CLIENT_ID='1029477374585-tjj1u15otjiu43jdsa7ccn1ntovihbue.apps.googleusercontent.com';
const SCOPES='https://www.googleapis.com/auth/drive.appdata';
const FILE_NAME='jido-pm-data.json';
const COLS={todo:'할 일',doing:'진행 중',review:'검토',done:'완료'};
const TAGS={design:{label:'디자인',cls:'tag-design'},dev:{label:'개발',cls:'tag-dev'},review:{label:'검토',cls:'tag-review'},done:{label:'완료',cls:'tag-done'},etc:{label:'기타',cls:'tag-etc'}};
const PRIO={high:{cls:'p-high'},mid:{cls:'p-mid'},low:{cls:'p-low'}};
const EV_COLS=['ev-blue','ev-purple','ev-green','ev-amber'];

let tasks=[],nextId=1,editingId=null;
let calYear=new Date().getFullYear(),calMonth=new Date().getMonth();
let accessToken=null,driveFileId=null,syncTimeout=null;

function signIn(){
  const client=google.accounts.oauth2.initTokenClient({
    client_id:CLIENT_ID,scope:SCOPES,
    callback:async(res)=>{
      if(res.error){showToast('로그인 실패');return;}
      accessToken=res.access_token;
      document.getElementById('btn-signin').style.display='none';
      document.getElementById('btn-signout').style.display='';
      setSyncStatus('syncing','동기화 중...');
      await loadFromDrive();
    }
  });
  client.requestAccessToken();
}

function signOut(){
  accessToken=null;driveFileId=null;
  document.getElementById('btn-signin').style.display='';
  document.getElementById('btn-signout').style.display='none';
  setSyncStatus('','로그인 필요');
  showToast('로그아웃 되었습니다');
}

function setSyncStatus(type,text){
  const dot=document.getElementById('sync-dot');
  dot.className='sync-dot'+(type?' '+type:'');
  document.getElementById('sync-text').textContent=text;
}

async function loadFromDrive(){
  try{
    const listRes=await fetch("https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name='"+FILE_NAME+"'&fields=files(id)",{headers:{Authorization:'Bearer '+accessToken}});
    const listData=await listRes.json();
    if(listData.files&&listData.files.length>0){
      driveFileId=listData.files[0].id;
      const fileRes=await fetch('https://www.googleapis.com/drive/v3/files/'+driveFileId+'?alt=media',{headers:{Authorization:'Bearer '+accessToken}});
      const data=await fileRes.json();
      tasks=data.tasks||[];nextId=data.nextId||tasks.length+1;
      setSyncStatus('ok','동기화 완료');
      showToast('Google Drive에서 불러왔어요');
    } else {
      setSyncStatus('ok','준비 완료');
      showToast('새 데이터 파일을 만들었어요');
      await saveToDrive();
    }
  } catch(e){
    setSyncStatus('error','동기화 오류');
    showToast('불러오기 실패');
  }
  renderAll();
}

async function saveToDrive(){
  if(!accessToken)return;
  setSyncStatus('syncing','저장 중...');
  try{
    const content=JSON.stringify({tasks,nextId});
    if(driveFileId){
      await fetch('https://www.googleapis.com/upload/drive/v3/files/'+driveFileId+'?uploadType=media',{
        method:'PATCH',
        headers:{Authorization:'Bearer '+accessToken,'Content-Type':'application/json'},
        body:content
      });
    } else {
      const meta={name:FILE_NAME,parents:['appDataFolder']};
      const form=new FormData();
      form.append('metadata',new Blob([JSON.stringify(meta)],{type:'application/json'}));
      form.append('file',new Blob([content],{type:'application/json'}));
      const res=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',{
        method:'POST',headers:{Authorization:'Bearer '+accessToken},body:form
      });
      const data=await res.json();driveFileId=data.id;
    }
    setSyncStatus('ok','저장 완료');
  } catch(e){
    setSyncStatus('error','저장 실패');
    showToast('저장 실패');
  }
}

function scheduleSave(){clearTimeout(syncTimeout);syncTimeout=setTimeout(saveToDrive,1200);}

function saveLocal(){try{localStorage.setItem('jido_tasks',JSON.stringify({tasks,nextId}));}catch(e){}}
function loadLocal(){try{const d=localStorage.getItem('jido_tasks');if(d){const p=JSON.parse(d);tasks=p.tasks||[];nextId=p.nextId||1;}}catch(e){}}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function switchTab(t){
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',['board','list','cal'][i]===t));
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+t).classList.add('active');
  renderAll();
}

function renderAll(){renderStats();renderBoard();renderList();renderCal();}

function renderStats(){
  const c={todo:0,doing:0,review:0,done:0};
  tasks.forEach(t=>c[t.status]=(c[t.status]||0)+1);
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="stat-num">${tasks.length}</div><div class="stat-label">전체</div></div>
    <div class="stat"><div class="stat-num blue">${c.doing}</div><div class="stat-label">진행 중</div></div>
    <div class="stat"><div class="stat-num amber">${c.review}</div><div class="stat-label">검토</div></div>
    <div class="stat"><div class="stat-num green">${c.done}</div><div class="stat-label">완료</div></div>`;
}

function renderBoard(){
  document.getElementById('board').innerHTML=Object.entries(COLS).map(([k,v])=>{
    const cards=tasks.filter(t=>t.status===k);
    return '<div class="col"><div class="col-head">'+v+'<span class="col-count">'+cards.length+'</span></div>'+
      cards.map(c=>'<div class="card" onclick="openModal('+c.id+')"><div class="card-title"><span class="prio-dot '+PRIO[c.priority].cls+'"></span>'+c.name+'</div>'+
        '<div class="card-meta"><span class="tag '+TAGS[c.tag].cls+'">'+TAGS[c.tag].label+'</span><span class="due">'+fmtDate(c.due)+'</span></div>'+
        (c.memo?'<div style="font-size:11px;color:#aaa;margin-top:6px;line-height:1.4">'+c.memo+'</div>':'')+
        '</div>').join('')+'</div>';
  }).join('');
}

function renderList(){
  document.getElementById('list').innerHTML=tasks.map(t=>
    '<div class="task-row">'+
    '<div class="check '+(t.status==='done'?'done':'')+'" onclick="toggleDone('+t.id+',event)">&#10003;</div>'+
    '<span class="task-name '+(t.status==='done'?'done':'')+'" onclick="openModal('+t.id+')">'+t.name+'</span>'+
    '<span class="tag '+TAGS[t.tag].cls+'">'+TAGS[t.tag].label+'</span>'+
    '<span class="task-date">'+fmtDate(t.due)+'</span></div>'
  ).join('');
}

function toggleDone(id,e){
  e.stopPropagation();
  const t=tasks.find(t=>t.id===id);
  if(t)t.status=t.status==='done'?'todo':'done';
  saveLocal();scheduleSave();renderAll();
}

function renderCal(){
  const months=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('cal-month').textContent=calYear+'년 '+months[calMonth];
  const first=new Date(calYear,calMonth,1).getDay();
  const days=new Date(calYear,calMonth+1,0).getDate();
  const prevDays=new Date(calYear,calMonth,0).getDate();
  const today=new Date();
  let html='';
  for(let i=0;i<first;i++)html+='<div class="day other-month"><div class="day-num">'+(prevDays-first+1+i)+'</div></div>';
  for(let d=1;d<=days;d++){
    const isToday=calYear===today.getFullYear()&&calMonth===today.getMonth()&&d===today.getDate();
    const ds=calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const dt=tasks.filter(t=>t.due===ds);
    html+='<div class="day '+(isToday?'today':'')+'"><div class="day-num">'+d+'</div>'+
      dt.slice(0,2).map((t,i)=>'<div class="event '+EV_COLS[i%4]+'" onclick="openModal('+t.id+')">'+t.name+'</div>').join('')+
      (dt.length>2?'<div class="more-label">+'+(dt.length-2)+'개 더</div>':'')+
      '</div>';
  }
  const remain=(first+days)%7===0?0:7-(first+days)%7;
  for(let d=1;d<=remain;d++)html+='<div class="day other-month"><div class="day-num">'+d+'</div></div>';
  document.getElementById('cal-grid').innerHTML=html;
}

function changeMonth(d){
  calMonth+=d;
  if(calMonth>11){calMonth=0;calYear++;}
  if(calMonth<0){calMonth=11;calYear--;}
  renderCal();
}

function fmtDate(s){
  if(!s)return'';
  const[,m,d]=s.split('-');return m+'월 '+d+'일';
}

function openModal(id){
  editingId=id;
  const del=document.getElementById('btn-delete');
  if(id===null){
    document.getElementById('modal-title').textContent='새 작업 추가';
    document.getElementById('f-name').value='';
    document.getElementById('f-memo').value='';
    document.getElementById('f-status').value='todo';
    document.getElementById('f-tag').value='design';
    document.getElementById('f-priority').value='mid';
    document.getElementById('f-due').value=new Date().toISOString().split('T')[0];
    del.style.visibility='hidden';
  } else {
    const t=tasks.find(t=>t.id===id);
    document.getElementById('modal-title').textContent='작업 수정';
    document.getElementById('f-name').value=t.name;
    document.getElementById('f-memo').value=t.memo||'';
    document.getElementById('f-status').value=t.status;
    document.getElementById('f-tag').value=t.tag;
    document.getElementById('f-priority').value=t.priority;
    document.getElementById('f-due').value=t.due;
    del.style.visibility='visible';
  }
  document.getElementById('overlay').classList.add('open');
  setTimeout(()=>document.getElementById('f-name').focus(),50);
}

function closeModal(){document.getElementById('overlay').classList.remove('open');editingId=null;}
function closeOverlay(e){if(e.target===document.getElementById('overlay'))closeModal();}

function saveTask(){
  const name=document.getElementById('f-name').value.trim();
  if(!name)return;
  const data={name,memo:document.getElementById('f-memo').value.trim(),status:document.getElementById('f-status').value,tag:document.getElementById('f-tag').value,priority:document.getElementById('f-priority').value,due:document.getElementById('f-due').value};
  if(editingId===null){tasks.unshift({id:nextId++,...data});}
  else{const idx=tasks.findIndex(t=>t.id===editingId);if(idx>-1)tasks[idx]={...tasks[idx],...data};}
  saveLocal();scheduleSave();closeModal();renderAll();
}

function deleteTask(){
  if(editingId===null)return;
  if(!confirm('이 작업을 삭제할까요?'))return;
  tasks=tasks.filter(t=>t.id!==editingId);
  saveLocal();scheduleSave();closeModal();renderAll();
}

loadLocal();renderAll();
</script>
