*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard',-apple-system,sans-serif;background:#f2f1ed;color:#1a1a18;min-height:100vh}
:root{
  --bg:#f2f1ed;--card:#fff;--border:#e4e2db;--border2:#ccc;
  --text:#1a1a18;--text2:#666;--text3:#aaa;
  --blue:#378ADD;--green:#1D9E75;--amber:#EF9F27;--red:#E24B4A;
  --r:10px;--r2:14px
}

.app{max-width:1040px;margin:0 auto;padding:18px 14px}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.logo{font-size:17px;font-weight:700;letter-spacing:-.03em}
.logo em{color:var(--blue);font-style:normal}
.logo-jido{font-family:'JidoFont',sans-serif;font-weight:normal;letter-spacing:.3em}
.sync-bar{display:flex;align-items:center;gap:7px}
.sync-pill{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text3);background:var(--card);border:1px solid var(--border);border-radius:20px;padding:4px 10px}
.dot{width:6px;height:6px;border-radius:50%;background:#ccc;flex-shrink:0}
.dot.ok{background:var(--green)}.dot.syncing{background:var(--amber);animation:blink 1s infinite}.dot.err{background:var(--red)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.bsm{font-size:12px;padding:5px 11px;border-radius:7px;border:1px solid var(--border2);background:var(--card);cursor:pointer;font-family:inherit;color:var(--text2);transition:all .15s}
.bsm:hover{background:var(--bg)}
.bsm.pri{background:var(--blue);color:#fff;border-color:var(--blue)}
.bsm.pri:hover{background:#2a6fb0}

/* Nav */
.nav{display:flex;align-items:center;gap:6px;margin-bottom:18px;flex-wrap:wrap}
.nav-tabs{display:flex;gap:2px;background:#e4e2db;padding:3px;border-radius:9px}
.ntab{padding:6px 13px;font-size:13px;font-family:inherit;border:none;background:none;cursor:pointer;border-radius:7px;color:var(--text2);font-weight:500;transition:all .15s;white-space:nowrap}
.ntab.active{background:var(--card);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.09)}
.proj-filter{display:flex;gap:4px;flex-wrap:wrap}
.pchip{font-size:12px;padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:var(--card);cursor:pointer;font-family:inherit;color:var(--text2);transition:all .15s;display:flex;align-items:center;gap:5px}
.pchip-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.btn-new{margin-left:auto;font-size:13px;padding:7px 13px;border:1.5px solid var(--border2);border-radius:var(--r);background:var(--card);cursor:pointer;color:var(--text2);font-family:inherit;font-weight:500;transition:all .15s;white-space:nowrap}
.btn-new:hover{background:var(--bg)}

/* Views */
.view{display:none}.view.active{display:block}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.stat{background:var(--card);border-radius:var(--r);padding:11px 13px;border:1px solid var(--border);text-align:center}
.stat-n{font-size:20px;font-weight:700}.stat-l{font-size:11px;color:var(--text3);margin-top:1px;font-weight:500}

/* Board */
.board{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
@media(max-width:700px){.board{grid-template-columns:repeat(2,1fr)}}
.col{background:#eae8e2;border-radius:12px;padding:11px}
.col-head{font-size:11px;font-weight:700;color:#999;margin-bottom:9px;display:flex;justify-content:space-between;text-transform:uppercase;letter-spacing:.06em}
.col-cnt{background:var(--card);border-radius:10px;padding:1px 7px;font-size:11px;color:var(--text2)}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;margin-bottom:7px;cursor:pointer;transition:all .15s}
.card:last-child{margin-bottom:0}
.card:hover{border-color:#a8c8e8;box-shadow:0 2px 8px rgba(55,138,221,.1)}
.card-proj{font-size:10px;font-weight:600;margin-bottom:4px;display:flex;align-items:center;gap:4px}
.card-title{font-size:13px;font-weight:500;line-height:1.4;margin-bottom:6px}
.card-meta{display:flex;justify-content:space-between;align-items:center;gap:6px}
.tag{font-size:11px;padding:2px 7px;border-radius:9px;font-weight:600}
.tag-design{background:#EEEDFE;color:#3C3489}.tag-dev{background:#E1F5EE;color:#085041}
.tag-review{background:#FAEEDA;color:#633806}.tag-etc{background:#f0ede8;color:#555}
.due{font-size:11px;color:var(--text3)}
.pdot{width:5px;height:5px;border-radius:50%;display:inline-block;margin-right:4px}
.p-high{background:var(--red)}.p-mid{background:var(--amber)}.p-low{background:var(--green)}
.prog-bar-wrap{height:3px;background:#eee;border-radius:2px;margin-top:7px;overflow:hidden}
.prog-bar{height:100%;border-radius:2px;background:var(--green);transition:width .3s}

/* ── Tree List ── */
.tree-wrap{display:flex;flex-direction:column;gap:1px}
.tree-node{}
.tree-row{display:flex;align-items:center;gap:0;padding:7px 10px;background:var(--card);border-radius:var(--r);border:1px solid var(--border);cursor:pointer;transition:all .15s;position:relative}
.tree-row:hover{border-color:#a8c8e8}
.tree-indent{flex-shrink:0}
.tree-toggle{width:20px;height:20px;display:flex;align-items:center;justify-content:center;border-radius:4px;font-size:10px;color:var(--text3);flex-shrink:0;cursor:pointer;transition:transform .15s}
.tree-toggle.open{transform:rotate(90deg)}
.tree-toggle.leaf{cursor:default;color:transparent}
.chk{width:16px;height:16px;border:1.5px solid #ccc;border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;transition:all .15s;cursor:pointer;margin-right:8px}
.chk.done{background:var(--green);border-color:var(--green);color:#fff}
.tname{flex:1;font-size:13px;font-weight:500;line-height:1.3}
.tname.done{text-decoration:line-through;color:var(--text3)}
.tree-meta{display:flex;align-items:center;gap:8px;flex-shrink:0}
.tree-prog{font-size:11px;color:var(--text3)}
.tree-date{font-size:11px;color:var(--text3)}
.tree-proj-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.tree-children{margin-left:0;margin-top:1px;display:flex;flex-direction:column;gap:1px}

/* Calendar */
.cal-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:13px}
.cal-m{font-size:15px;font-weight:600}
.cal-nav{display:flex;gap:5px}
.nbtn{width:28px;height:28px;border:1px solid var(--border2);background:var(--card);border-radius:7px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;color:var(--text2)}
.nbtn:hover{background:var(--bg)}
.gl{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:2px}
.dl{font-size:11px;font-weight:600;text-align:center;color:var(--text3);padding:4px 0}
.cg{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.day{min-height:70px;background:var(--card);border-radius:7px;padding:5px;border:1px solid var(--border);cursor:pointer}
.day:hover{border-color:#a8c8e8}
.day.om{background:var(--bg);opacity:.5}
.day.today{border-color:var(--blue)}
.day.today .dn{background:var(--blue);color:#fff;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center}
.dn{font-size:11px;font-weight:500;width:20px;height:20px;display:flex;align-items:center;justify-content:center;margin-bottom:2px}
.day.om .dn{color:#bbb}
.ev{font-size:10px;padding:2px 4px;border-radius:3px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}

/* Daily */
.daily-date{font-size:13px;color:var(--text2);margin-bottom:12px;font-weight:500}
.daily-layout{display:grid;grid-template-columns:1fr 290px;gap:14px}
@media(max-width:720px){.daily-layout{grid-template-columns:1fr}}
.sec-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.daily-sub-tabs{display:flex;gap:2px;background:#e4e2db;padding:3px;border-radius:8px;margin-bottom:12px;width:fit-content}
.dstab{padding:5px 13px;font-size:12px;font-family:inherit;border:none;background:none;cursor:pointer;border-radius:6px;color:var(--text2);font-weight:500;transition:all .15s}
.dstab.active{background:var(--card);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.09)}
/* task list */
.daily-tasks{display:flex;flex-direction:column;gap:5px}
.dtask{display:flex;align-items:center;gap:10px;padding:10px 13px;background:var(--card);border-radius:var(--r);border:1px solid var(--border)}
.dtask-info{flex:1;min-width:0}
.dtask-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dtask-proj{font-size:11px;color:var(--text3);margin-top:2px;display:flex;align-items:center;gap:4px}
.time-input{width:52px;font-size:13px;padding:5px 8px;border:1px solid var(--border2);border-radius:6px;background:var(--bg);color:var(--text);font-family:inherit;text-align:center}
.time-input:focus{outline:none;border-color:var(--blue)}
.time-lbl{font-size:11px;color:var(--text3)}
/* timeline */
.timeline-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;position:relative}
.tl-inner{position:relative}
.tl-row{display:flex;min-height:54px;border-bottom:1px solid var(--border);position:relative}
.tl-row:last-child{border-bottom:none}
.tl-row.is-now{background:#fef9f0}
.tl-hour{width:50px;flex-shrink:0;font-size:11px;color:var(--text3);font-weight:500;padding:8px 8px 0;text-align:right;border-right:1px solid var(--border)}
.tl-slot{flex:1;padding:4px 8px;position:relative}
.tl-event{display:flex;align-items:center;gap:7px;padding:5px 9px;border-radius:7px;cursor:pointer;margin-bottom:3px;transition:filter .15s}
.tl-event:hover{filter:brightness(.95)}
.tl-evt-chk{width:13px;height:13px;border-radius:3px;border:1.5px solid rgba(0,0,0,.2);background:none;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;cursor:pointer;transition:all .15s}
.tl-evt-chk.done{background:rgba(0,0,0,.18);color:#fff}
.tl-evt-name{font-size:12px;font-weight:500;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tl-evt-dur{font-size:11px;opacity:.65;flex-shrink:0}
.tl-add{width:100%;text-align:left;font-size:12px;color:var(--text3);background:none;border:1.5px dashed transparent;cursor:pointer;padding:3px 4px;border-radius:5px;font-family:inherit;opacity:0;transition:all .15s}
.tl-slot:hover .tl-add{opacity:1;border-color:var(--border2)}
.tl-now-wrap{position:absolute;left:0;right:0;pointer-events:none;z-index:5}
.tl-now-line{position:absolute;left:50px;right:0;height:2px;background:var(--red)}
.tl-now-circle{position:absolute;left:44px;width:8px;height:8px;border-radius:50%;background:var(--red);top:-3px}
/* summary */
.time-summary{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:16px}
.time-total{text-align:center;padding:12px 0;border-bottom:1px solid var(--border);margin-bottom:14px}
.time-total-n{font-size:28px;font-weight:700}
.time-total-l{font-size:12px;color:var(--text3);margin-top:3px}
.proj-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.proj-bar-name{font-size:12px;color:var(--text2);min-width:70px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.proj-bar-wrap{flex:1;height:5px;background:var(--bg);border-radius:3px;overflow:hidden}
.proj-bar-fill{height:100%;border-radius:3px;transition:width .4s}
.proj-bar-n{font-size:11px;font-weight:600;color:var(--text2);min-width:34px;text-align:right}

/* Report */
.report-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
@media(max-width:680px){.report-grid{grid-template-columns:1fr 1fr}}
.rcard{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:15px}
.rcard-top{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.rcard-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px}
.rcard-name{font-size:13px;font-weight:600}
.rcard-h{font-size:24px;font-weight:700;margin-bottom:2px}
.rcard-sub{font-size:11px;color:var(--text3)}
.rcard-bar{height:4px;background:var(--bg);border-radius:2px;margin-top:10px;overflow:hidden}
.rcard-fill{height:100%;border-radius:2px}
.report-log{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:16px}
.log-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border)}
.log-row:last-child{border-bottom:none}
.log-date{font-size:12px;color:var(--text3);min-width:68px}
.log-proj{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:500;flex:1}
.log-task{font-size:12px;color:var(--text2);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.log-h{font-size:13px;font-weight:600}

/* Projects tab */
.proj-list{display:flex;flex-direction:column;gap:8px}
.proj-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .15s}
.proj-card:hover{border-color:#a8c8e8}
.proj-icon-big{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.proj-info{flex:1;min-width:0}
.proj-name{font-size:14px;font-weight:600}
.proj-meta{font-size:12px;color:var(--text3);margin-top:2px}
.proj-stats{display:flex;gap:14px;flex-shrink:0}
.proj-stat{text-align:center}
.proj-stat-n{font-size:15px;font-weight:700}
.proj-stat-l{font-size:11px;color:var(--text3)}

/* ── Side Panel ── */
.side-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:150}
.side-overlay.open{display:block}
.side-panel{position:fixed;top:0;right:0;width:420px;max-width:96vw;height:100vh;background:var(--card);border-left:1px solid var(--border);z-index:160;overflow-y:auto;transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1)}
.side-panel.open{transform:translateX(0)}
.sp-header{display:flex;align-items:flex-start;gap:10px;padding:18px 18px 0}
.sp-close{width:28px;height:28px;border:1px solid var(--border);border-radius:7px;background:none;cursor:pointer;font-size:16px;color:var(--text2);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-left:auto}
.sp-close:hover{background:var(--bg)}
.sp-body{padding:14px 18px 24px}
.sp-title-input{width:100%;font-size:16px;font-weight:600;border:none;background:none;color:var(--text);font-family:inherit;outline:none;padding:0;margin-bottom:10px}
.sp-title-input:focus{border-bottom:1.5px solid var(--blue)}
.sp-field{margin-bottom:12px}
.sp-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.sp-select,.sp-date{font-size:13px;padding:6px 9px;border:1px solid var(--border2);border-radius:7px;background:var(--bg);color:var(--text);font-family:inherit;outline:none}
.sp-select:focus,.sp-date:focus{border-color:var(--blue)}
.sp-memo{width:100%;font-size:13px;padding:8px 10px;border:1px solid var(--border2);border-radius:7px;background:var(--bg);color:var(--text);font-family:inherit;outline:none;resize:vertical;min-height:60px}
.sp-memo:focus{border-color:var(--blue)}
.sp-row{display:flex;gap:10px}
.sp-row .sp-field{flex:1}
.sp-divider{height:1px;background:var(--border);margin:16px 0}
.sp-subtasks-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.sp-prog{font-size:12px;color:var(--text3)}
.sp-prog-bar{height:4px;background:#eee;border-radius:2px;margin-bottom:12px;overflow:hidden}
.sp-prog-fill{height:100%;background:var(--green);border-radius:2px;transition:width .3s}
.sp-subtask-list{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.sp-sub-row{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:7px;border:1px solid var(--border);background:var(--bg);cursor:pointer;transition:all .15s}
.sp-sub-row:hover{border-color:#a8c8e8;background:#fff}
.sp-sub-name{flex:1;font-size:13px}
.sp-sub-name.done{text-decoration:line-through;color:var(--text3)}
.sp-sub-date{font-size:11px;color:var(--text3);flex-shrink:0}
.sp-sub-chevron{font-size:11px;color:var(--text3)}
.btn-add-sub{width:100%;font-size:13px;padding:8px;border:1.5px dashed var(--border2);border-radius:7px;background:none;cursor:pointer;color:var(--text3);font-family:inherit;transition:all .15s}
.btn-add-sub:hover{border-color:var(--blue);color:var(--blue);background:#f0f7ff}
.sp-actions{display:flex;justify-content:space-between;align-items:center;margin-top:20px}
.btn-del-task{font-size:12px;padding:7px 12px;border:1px solid #ffd0d0;border-radius:7px;background:none;cursor:pointer;color:var(--red);font-family:inherit}
.btn-del-task:hover{background:#fff0f0}
.btn-save-task{font-size:13px;padding:8px 16px;border:none;border-radius:7px;background:var(--blue);color:#fff;cursor:pointer;font-family:inherit;font-weight:600}
.btn-save-task:hover{background:#2a6fb0}
.sp-breadcrumb{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--text3);margin-bottom:12px;flex-wrap:wrap}
.sp-bc-item{cursor:pointer;color:var(--blue)}
.sp-bc-item:hover{text-decoration:underline}
.sp-bc-sep{color:var(--text3)}

/* Modals */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--card);border-radius:var(--r2);padding:22px;width:340px;max-width:94vw;box-shadow:0 10px 50px rgba(0,0,0,.18)}
.modal h3{font-size:15px;font-weight:700;margin-bottom:16px}
.field{margin-bottom:11px}
.field label{font-size:12px;color:var(--text2);display:block;margin-bottom:4px;font-weight:500}
.field input,.field select,.field textarea{width:100%;font-size:13px;padding:8px 10px;border:1px solid var(--border2);border-radius:7px;background:#fafaf8;color:var(--text);font-family:inherit;outline:none;transition:border-color .15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--blue)}
.field textarea{resize:vertical;min-height:55px}
.icon-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:5px;margin-top:4px}
.icon-opt{width:34px;height:34px;border-radius:7px;border:1.5px solid var(--border);background:var(--bg);cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.icon-opt.sel{border-color:var(--blue);background:#E6F1FB}
.color-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:5px;margin-top:4px}
.color-opt{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s}
.color-opt.sel{border-color:var(--text);transform:scale(1.15)}
.modal-btns{display:flex;justify-content:space-between;align-items:center;margin-top:18px}
.btn-del{font-size:12px;padding:7px 12px;border:1px solid #ffd0d0;border-radius:7px;background:none;cursor:pointer;color:var(--red);font-family:inherit}
.btn-del:hover{background:#fff0f0}
.btn-r{display:flex;gap:7px}
.btn-cancel{font-size:13px;padding:7px 13px;border:1px solid var(--border2);border-radius:7px;background:none;cursor:pointer;color:var(--text2);font-family:inherit}
.btn-cancel:hover{background:var(--bg)}
.btn-save{font-size:13px;padding:7px 15px;border:none;border-radius:7px;background:var(--blue);color:#fff;cursor:pointer;font-family:inherit;font-weight:600}
.btn-save:hover{background:#2a6fb0}

.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#1a1a18;color:#fff;font-size:13px;padding:9px 17px;border-radius:9px;z-index:400;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.confirm-box{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:#fff;border:1px solid var(--border);border-radius:12px;padding:14px 18px;z-index:500;box-shadow:0 8px 32px rgba(0,0,0,.18);display:flex;align-items:center;gap:12px;white-space:nowrap}
.confirm-box.hide{display:none}
.confirm-msg{font-size:13px;color:var(--text)}
.confirm-yes{font-size:12px;padding:6px 13px;border:none;border-radius:7px;background:var(--red);color:#fff;cursor:pointer;font-family:inherit;font-weight:600}
.confirm-no{font-size:12px;padding:6px 13px;border:1px solid var(--border2);border-radius:7px;background:none;cursor:pointer;font-family:inherit;color:var(--text2)}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo"><span class="logo-jido">jido.<em style="color:var(--blue);font-style:normal">pm</em></span></div>
    <div class="sync-bar">
      <div class="sync-pill"><span class="dot" id="sync-dot"></span><span id="sync-text">로그인 필요</span></div>
      <button class="bsm pri" id="btn-signin" onclick="signIn()">Google 로그인</button>
      <button class="bsm" id="btn-signout" onclick="signOut()" style="display:none">로그아웃</button>
    </div>
  </div>
  <div class="nav">
    <div class="nav-tabs">
      <button class="ntab active" onclick="switchTab('board')">보드</button>
      <button class="ntab" onclick="switchTab('list')">목록</button>
      <button class="ntab" onclick="switchTab('cal')">캘린더</button>
      <button class="ntab" onclick="switchTab('daily')">데일리</button>
      <button class="ntab" onclick="switchTab('report')">리포트</button>
      <button class="ntab" onclick="switchTab('projects')">프로젝트</button>
    </div>
    <div class="proj-filter" id="proj-filter"></div>
    <button class="btn-new" onclick="openNewTask()">+ 새 작업</button>
  </div>

  <div id="view-board" class="view active">
    <div class="stats" id="stats"></div>
    <div class="board" id="board"></div>
  </div>
  <div id="view-list" class="view">
    <div class="tree-wrap" id="tree"></div>

// ── Google Drive ──────────────────────────────────────────
(function(){var s=document.createElement('script');s.src='https://accounts.google.com/gsi/client';document.head.appendChild(s);})();
function signIn(){
  if(typeof google==='undefined'){showToast('잠시 후 다시 시도해주세요');return;}
  google.accounts.oauth2.initTokenClient({client_id:CLIENT_ID,scope:SCOPES,callback:async(res)=>{
    if(res.error){showToast('로그인 실패');return;}
    accessToken=res.access_token;
        localStorage.setItem('jido_accessToken', accessToken);
    document.getElementById('btn-signin').style.display='none';
    document.getElementById('btn-signout').style.display='';
    setSyncStatus('syncing','동기화 중...');
    await loadFromDrive();
    await fetchGcalEvents();
  }}).requestAccessToken();
}
function signOut(){accessToken=null;driveFileId=null;
  localStorage.removeItem('jido_accessToken');document.getElementById('btn-signin').style.display='';document.getElementById('btn-signout').style.display='none';setSyncStatus('','로그인 필요');showToast('로그아웃');}
async function fetchGcalEvents(){
  if(!accessToken) return;
  try{
    const today=todayStr();
    const tMin=encodeURIComponent(today+'T00:00:00+09:00');
    const tMax=encodeURIComponent(today+'T23:59:59+09:00');
    const r=await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${tMin}&timeMax=${tMax}&singleEvents=true&orderBy=startTime`,{headers:{Authorization:'Bearer '+accessToken}});
    const d=await r.json();
    gcalEvents=(d.items||[])
      // Keep events that have a start date or dateTime
      .filter(e=> e.start && (e.start.dateTime || e.start.date))
      // Exclude events that correspond to existing tasks (prevent duplicates)
      .filter(e=> !tasks.some(t => t.gcalEventId === e.id));
    showToast('Google 캘린더 불러옴 ('+gcalEvents.length+'개)');
    if(dailyTab==='timeline') renderTimeline();
  }catch(e){console.warn('GCal fetch failed',e);}
}
function setSyncStatus(t,txt){document.getElementById('sync-dot').className='dot'+(t?' '+t:'');document.getElementById('sync-text').textContent=txt;}
async function loadFromDrive(){
  try{
    const r=await fetch(`https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name='${FILE_NAME}'&fields=files(id)`,{headers:{Authorization:'Bearer '+accessToken}});
    const d=await r.json();
    if(d.files&&d.files.length>0){
      driveFileId=d.files[0].id;
      const data=await(await fetch(`https://www.googleapis.com/drive/v3/files/${driveFileId}?alt=media`,{headers:{Authorization:'Bearer '+accessToken}})).json();
      projects=data.projects||projects;tasks=data.tasks||tasks;nextTaskId=data.nextTaskId||nextTaskId;nextProjId=data.nextProjId||nextProjId;
      setSyncStatus('ok','동기화 완료');showToast('불러오기 완료');
    } else {await saveToDrive();setSyncStatus('ok','준비 완료');}
  }catch(e){setSyncStatus('err','오류');showToast('불러오기 실패');}
  renderAll();
}
async function saveToDrive(){
  if(!accessToken)return;

    if(driveFileId){
      await fetch(`https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=media`,{method:'PATCH',headers:{Authorization:'Bearer '+accessToken,'Content-Type':'application/json'},body:content});
    } else {
      const form=new FormData();
      form.append('metadata',new Blob([JSON.stringify({name:FILE_NAME,parents:['appDataFolder']})],{type:'application/json'}));
      form.append('file',new Blob([content],{type:'application/json'}));
      driveFileId=(await(await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',{method:'POST',headers:{Authorization:'Bearer '+accessToken},body:form})).json()).id;
    }
    setSyncStatus('ok','저장 완료');
  }catch(e){setSyncStatus('err','저장 실패');}
}

// ── Google Calendar Sync (auto-create/update events) ─────────────────
async function syncTaskToGcal(task){
  if(!accessToken) return;
  if(!task || !task.due) return;
  try{
    let event;
    if(task.startHour===undefined || task.startHour===null){
      // If no start time is provided, create an all-day event. Set end date to the next day.
      const dueDate = new Date(task.due + 'T00:00:00');
      const endDate = new Date(dueDate.getTime());
      endDate.setDate(endDate.getDate()+1);
      const endDateStr = endDate.toISOString().split('T')[0];
      event={
        summary:task.name,
        description:task.memo || '',
        start:{date:task.due},
        end:{date:endDateStr}
      };
    } else {
      // Timed event uses dateTime fields with planned duration (default to 60 minutes)
      const startDate=new Date(task.due + 'T' + String(task.startHour).padStart(2,'0') + ':00:00+09:00');
      const endDate=new Date(startDate.getTime() + ((task.plannedTime || 60)*60000));
      event={
        summary:task.name,
        description:task.memo || '',
        start:{dateTime:startDate.toISOString()},
        end:{dateTime:endDate.toISOString()}
      };
    }
    if(task.gcalEventId){
      await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events/${task.gcalEventId}`,{
        method:'PATCH',
        headers:{Authorization:'Bearer '+accessToken,'Content-Type':'application/json'},
        body:JSON.stringify(event)
      });
    } else {
      const resp=await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events',{
        method:'POST',
        headers:{Authorization:'Bearer '+accessToken,'Content-Type':'application/json'},
        body:JSON.stringify(event)
      });
      const data=await resp.json();
      if(data && data.id) task.gcalEventId=data.id;
    }
  } catch(e){ console.warn('GCal sync failed',e); }
}

// ── Helpers ───────────────────────────────────────────────
function getProj(id){return projects.find(p=>p.id===id)||{name:'없음',color:'#ccc',icon:'📁',id:0};}
function rootTasks(){return tasks.filter(t=>!t.parentId&&(!selProjId||t.projId===selProjId));}
function childTasks(pid){return tasks.filter(t=>t.parentId===pid);}
function allDescendants(id){let res=[];const ch=childTasks(id);ch.forEach(c=>{res.push(c);res=res.concat(allDescendants(c.id));});return res;}
function calcProgress(id){const ch=childTasks(id);if(!ch.length)return null;const done=ch.filter(c=>c.status==='done').length;return{done,total:ch.length,pct:Math.round(done/ch.length*100)};}
function fmtDate(s){if(!s)return'';const[,m,d]=s.split('-');return m+'/'+d;}
function fmtMins(m){if(!m&&m!==0)return'-';if(!m)return'0m';const h=Math.floor(m/60),mm=m%60;return h>0?(mm>0?h+'h '+mm+'m':h+'h'):mm+'m';}
function todayStr(){return new Date().toISOString().split('T')[0];}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
function getAncestors(id){const res=[];let t=tasks.find(t=>t.id===id);while(t&&t.parentId){t=tasks.find(x=>x.id===t.parentId);if(t)res.unshift(t);}return res;}

          ${prog?`<div style="font-size:11px;color:var(--text3);margin-top:5px">${prog.done}/${prog.total} 완료</div><div class="prog-bar-wrap"><div class="prog-bar" style="width:${prog.pct}%"></div></div>`:''}
        </div>`;}).join('')+'</div>';}).join('');

function renderNode(task,depth,container){
  const children=childTasks(task.id);
  const hasChildren=children.length>0;
  const isCollapsed=collapsedIds.has(task.id);
  const prog=calcProgress(task.id);
  const p=getProj(task.projId);

  const nodeDiv=document.createElement('div');nodeDiv.className='tree-node';
  const row=document.createElement('div');row.className='tree-row';

  // indent
  const indent=document.createElement('div');
  indent.className='tree-indent';indent.style.width=(depth*20)+'px';row.appendChild(indent);

  // toggle
  const tog=document.createElement('div');
  tog.className='tree-toggle'+(hasChildren?' '+(isCollapsed?'':'open'):' leaf');
  tog.textContent=hasChildren?'▶':'';
  if(hasChildren)tog.onclick=(e)=>{e.stopPropagation();collapsedIds.has(task.id)?collapsedIds.delete(task.id):collapsedIds.add(task.id);renderTree();};
  row.appendChild(tog);

  // checkbox
  const chk=document.createElement('div');
  chk.className='chk'+(task.status==='done'?' done':'');
  chk.textContent='✓';
  chk.onclick=(e)=>{e.stopPropagation();task.status=task.status==='done'?'todo':'done';saveLocal();scheduleSave();renderAll();};
  row.appendChild(chk);

  // project dot
  const pd=document.createElement('span');
  pd.className='tree-proj-dot';pd.style.background=p.color;pd.style.marginRight='6px';row.appendChild(pd);

  // name
  const nm=document.createElement('span');
  nm.className='tname'+(task.status==='done'?' done':'');nm.textContent=task.name;row.appendChild(nm);

  // meta
  const meta=document.createElement('div');meta.className='tree-meta';
  if(prog){const ps=document.createElement('span');ps.className='tree-prog';ps.textContent=prog.done+'/'+prog.total;meta.appendChild(ps);}
  if(task.due){const dd=document.createElement('span');dd.className='tree-date';dd.textContent=fmtDate(task.due);meta.appendChild(dd);}
  row.appendChild(meta);

  // progress bar under row
  row.onclick=()=>openPanel(task.id);
  nodeDiv.appendChild(row);

  if(prog){
    const pb=document.createElement('div');
    pb.style.cssText=`margin-left:${(depth*20)+60}px;height:2px;background:#eee;border-radius:1px;margin-top:-2px;margin-bottom:2px;overflow:hidden`;
    const pf=document.createElement('div');
    pf.style.cssText=`width:${prog.pct}%;height:100%;background:var(--green);border-radius:1px`;
    pb.appendChild(pf);nodeDiv.appendChild(pb);
  }

  // children
  if(hasChildren&&!isCollapsed){
    const ch=document.createElement('div');ch.className='tree-children';
    children.forEach(c=>renderNode(c,depth+1,ch));
    nodeDiv.appendChild(ch);
  }
  container.appendChild(nodeDiv);
}

// ── Calendar ──────────────────────────────────────────────
function renderCal(){
  const months=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('cal-month').textContent=calYear+'년 '+months[calMonth];
  const first=new Date(calYear,calMonth,1).getDay();
  const days=new Date(calYear,calMonth+1,0).getDate();
  const prevDays=new Date(calYear,calMonth,0).getDate();
  const today=new Date();
  const ft=tasks.filter(t=>!selProjId||t.projId===selProjId);
  let html='';
  for(let i=0;i<first;i++)html+=`<div class="day om"><div class="dn">${prevDays-first+1+i}</div></div>`;
  for(let d=1;d<=days;d++){
    const isToday=calYear===today.getFullYear()&&calMonth===today.getMonth()&&d===today.getDate();
    const ds=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dt=ft.filter(t=>t.due===ds);
    html+=`<div class="day ${isToday?'today':''}"><div class="dn">${d}</div>`+
      dt.slice(0,2).map(t=>{const p=getProj(t.projId);return`<div class="ev" style="background:${p.color}22;color:${p.color}" onclick="openPanel(${t.id})">${t.name}</div>`;}).join('')+
      (dt.length>2?`<div style="font-size:10px;color:var(--text3)">+${dt.length-2}</div>`:'')+`</div>`;
  }
  const remain=(first+days)%7===0?0:7-(first+days)%7;
  for(let d=1;d<=remain;d++)html+=`<div class="day om"><div class="dn">${d}</div></div>`;
  document.getElementById('cal-grid').innerHTML=html;
}
function changeMonth(d){calMonth+=d;if(calMonth>11){calMonth=0;calYear++;}if(calMonth<0){calMonth=11;calYear--;}renderCal();}

// ── Daily ─────────────────────────────────────────────────
let dailyTab = 'tasks';
function switchDailyTab(t){
  dailyTab=t;
  document.querySelectorAll('.dstab').forEach((el,i)=>el.classList.toggle('active',['tasks','timeline'][i]===t));
  document.getElementById('daily-tasks-view').style.display=t==='tasks'?'block':'none';
  document.getElementById('daily-timeline-view').style.display=t==='timeline'?'block':'none';
  if(t==='timeline') renderTimeline();
}

function renderDaily(){
  const today=todayStr(); const d=new Date();
  document.getElementById('daily-date').textContent=`${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${['일','월','화','수','목','금','토'][d.getDay()]}요일)`;
  const todayTasks=tasks.filter(t=>t.due===today||t.status==='doing');
  let total=0; const pm={};
  todayTasks.forEach(t=>{total+=(t.plannedTime||0);pm[t.projId]=(pm[t.projId]||0)+(t.plannedTime||0);});
  document.getElementById('daily-total').textContent=fmtMins(total)||'0m';
  document.getElementById('daily-tasks').innerHTML=todayTasks.length===0?
    '<div style="font-size:13px;color:var(--text3);padding:20px 0;text-align:center">오늘 마감이거나 진행 중인 작업이 없어요</div>':
    todayTasks.map(t=>{const p=getProj(t.projId);return`
    <div class="dtask">
      <div class="chk ${t.status==='done'?'done':''}" onclick="quickToggle(${t.id},event)">✓</div>
      <div class="dtask-info" onclick="openPanel(${t.id})" style="cursor:pointer">
        <div class="dtask-name">${t.name}</div>
        <div class="dtask-proj"><span style="width:6px;height:6px;border-radius:50%;background:${p.color};display:inline-block"></span>${p.name}</div>
      </div>
      <input class="time-input" type="number" min="0" value="${t.plannedTime||0}" onchange="updateTime(${t.id},this.value)" onclick="event.stopPropagation()">
      <span class="time-lbl">분</span>
    </div>`;}).join('');
  const maxM=Math.max(...Object.values(pm),1);
  document.getElementById('daily-bars').innerHTML=Object.entries(pm).map(([pid,m])=>{const p=getProj(parseInt(pid));return`
    <div class="proj-bar-row">
      <div class="proj-bar-name">${p.icon} ${p.name}</div>
      <div class="proj-bar-wrap"><div class="proj-bar-fill" style="width:${(m/maxM*100).toFixed(0)}%;background:${p.color}"></div></div>
      <div class="proj-bar-n">${fmtMins(m)}</div>
    </div>`;}).join('');
  if(dailyTab==='timeline') renderTimeline();
}

function renderTimeline(){
  const today=todayStr();
  const todayTasks=tasks.filter(t=>t.due===today||t.status==='doing');
  const now=new Date();
  const nowH=now.getHours(), nowMin=now.getMinutes();
  const HOURS=Array.from({length:24},(_,i)=>i);
  const nowPx=nowH*54+(nowMin/60)*54;

  let html='';
  HOURS.forEach(h=>{
    const isNow=h===nowH;
    const hLabel=h===0?'오전 12시':h<12?`오전 ${h}시`:h===12?'오후 12시':`오후 ${h-12}시`;

    // PM tasks
    const slotTasks=todayTasks.filter(t=>(t.startHour??-1)===h);
    const tasksHtml=slotTasks.map(t=>{
      const p=getProj(t.projId);
      const dur=t.plannedTime?fmtMins(t.plannedTime):'';
      const isDone=t.status==='done';
      return `<div class="tl-event" style="background:${p.color}18;border:1px solid ${p.color}44" onclick="openPanel(${t.id})">
        <div class="tl-evt-chk ${isDone?'done':''}" onclick="quickToggle(${t.id},event)" style="border-color:${p.color}88;${isDone?'background:'+p.color+'55':''}">✓</div>
        <div class="tl-evt-name" style="color:${p.color}">${isDone?'<s>'+t.name+'</s>':t.name}</div>
        ${dur?`<div class="tl-evt-dur" style="color:${p.color}">${dur}</div>`:''}
      </div>`;
    }).join('');

    // Google Calendar events
    const gcalSlot=gcalEvents.filter(e=>{
      if(!e.start.dateTime) return false; // all-day skip per-hour (handled separately)
      const eH=new Date(e.start.dateTime).getHours();
      return eH===h;
    });
    const gcalHtml=gcalSlot.map(e=>{
      const start=new Date(e.start.dateTime);
      const end=e.end?.dateTime?new Date(e.end.dateTime):null;
      const dur=end?Math.round((end-start)/60000):null;
      const timeStr=start.getHours().toString().padStart(2,'0')+':'+start.getMinutes().toString().padStart(2,'0');
      return `<div class="tl-event" style="background:#E8F5E9;border:1px solid #81C784" title="${e.summary}">
        <span style="font-size:11px;color:#388E3C;flex-shrink:0">📅</span>
        <div class="tl-evt-name" style="color:#2E7D32">${e.summary||'(제목 없음)'}</div>
        <div class="tl-evt-dur" style="color:#388E3C">${timeStr}${dur?' · '+fmtMins(dur):''}</div>
      </div>`;
    }).join('');

    // All-day gcal events (show at top of 0시)
    const allDayHtml=h===0?gcalEvents.filter(e=>e.start.date&&!e.start.dateTime).map(e=>`
      <div class="tl-event" style="background:#FFF9C4;border:1px solid #F9A825">
        <span style="font-size:11px;color:#F57F17">🗓</span>
        <div class="tl-evt-name" style="color:#E65100">${e.summary||'(종일 일정)'}</div>
        <div class="tl-evt-dur" style="color:#F57F17">종일</div>
      </div>`).join(''):'';

    html+=`<div class="tl-row ${isNow?'is-now':''}" id="tl-h-${h}">
      <div class="tl-hour">${hLabel}</div>
      <div class="tl-slot">
        ${allDayHtml}${gcalHtml}${tasksHtml}
        <button class="tl-add" onclick="addTaskAtHour(${h})">+ 작업 추가</button>
      </div>
    </div>`;
  });

  const nowLine=`<div class="tl-now-wrap" style="top:${nowPx}px">
    <div class="tl-now-circle"></div><div class="tl-now-line"></div>
  </div>`;

  document.getElementById('tl-inner').innerHTML=html+nowLine;
  setTimeout(()=>{const row=document.getElementById('tl-h-'+nowH);if(row)row.scrollIntoView({block:'center',behavior:'smooth'});},100);
}

function addTaskAtHour(hour){
  const today=todayStr();
  const newTask={id:nextTaskId++,name:'새 작업',parentId:null,projId:selProjId||projects[0]?.id||1,memo:'',status:'todo',tag:'etc',priority:'mid',due:today,plannedTime:60,startHour:hour};
  tasks.unshift(newTask);
  syncTaskToGcal(newTask);
  saveLocal();scheduleSave();renderAll();
  openPanel(newTask.id);
}

function quickToggle(id,e){e.stopPropagation();const t=tasks.find(t=>t.id===id);if(t)t.status=t.status==='done'?'todo':'done';saveLocal();scheduleSave();renderAll();}
function updateTime(id,val){const t=tasks.find(t=>t.id===id);if(t)t.plannedTime=parseInt(val)||0;saveLocal();scheduleSave();syncTaskToGcal(t);renderDaily();}

// ── Report ────────────────────────────────────────────────
function renderReport(){
  const pd=projects.map(p=>{const pt=tasks.filter(t=>t.projId===p.id);return{...p,total:pt.reduce((a,t)=>a+(t.plannedTime||0),0),taskCount:pt.length,doneCount:pt.filter(t=>t.status==='done').length};});
  const maxT=Math.max(...pd.map(p=>p.total),1);
  document.getElementById('report-grid').innerHTML=pd.map(p=>`
    <div class="rcard">
      <div class="rcard-top"><div class="rcard-icon" style="background:${p.color}22">${p.icon}</div><div class="rcard-name">${p.name}</div></div>
      <div class="rcard-h" style="color:${p.color}">${fmtMins(p.total)||'0m'}</div>
      <div class="rcard-sub">${p.taskCount}개 작업 · 완료 ${p.doneCount}개</div>
      <div class="rcard-bar"><div class="rcard-fill" style="width:${(p.total/maxT*100).toFixed(0)}%;background:${p.color}"></div></div>
    </div>`).join('');
  const logged=tasks.filter(t=>t.plannedTime>0).sort((a,b)=>b.plannedTime-a.plannedTime);
  document.getElementById('report-log').innerHTML=logged.length===0?
    '<div style="font-size:13px;color:var(--text3);padding:10px 0">데일리 탭에서 시간을 입력하면 여기에 기록돼요!</div>':
    logged.map(t=>{const p=getProj(t.projId);return`
    <div class="log-row">
      <div class="log-date">${fmtDate(t.due)}</div>
      <div class="log-proj"><span style="width:7px;height:7px;border-radius:50%;background:${p.color};display:inline-block"></span>${p.name}</div>
      <div class="log-task">${t.name}</div>
      <div class="log-h">${fmtMins(t.plannedTime)}</div>
    </div>`;}).join('');
}

// ── Projects ──────────────────────────────────────────────
function renderProjList(){
  document.getElementById('proj-list').innerHTML=projects.map(p=>{
    const pt=tasks.filter(t=>t.projId===p.id&&!t.parentId);
    const done=tasks.filter(t=>t.projId===p.id&&t.status==='done').length;
    const total=tasks.filter(t=>t.projId===p.id).reduce((a,t)=>a+(t.plannedTime||0),0);
    return`<div class="proj-card" onclick="openProjModal(${p.id})">
      <div class="proj-icon-big" style="background:${p.color}22">${p.icon}</div>
      <div class="proj-info"><div class="proj-name">${p.name}</div><div class="proj-meta">${p.desc||'설명 없음'}</div></div>
      <div class="proj-stats">
        <div class="proj-stat"><div class="proj-stat-n">${pt.length}</div><div class="proj-stat-l">작업</div></div>
        <div class="proj-stat"><div class="proj-stat-n" style="color:var(--green)">${done}</div><div class="proj-stat-l">완료</div></div>
        <div class="proj-stat"><div class="proj-stat-n" style="color:var(--blue)">${fmtMins(total)||'0m'}</div><div class="proj-stat-l">시간</div></div>
      </div>
    </div>`;}).join('');
}

// ── Side Panel ────────────────────────────────────────────
function openPanel(id){
  panelTaskId=id;
  const t=tasks.find(t=>t.id===id);if(!t)return;

  // breadcrumb
  const ancestors=getAncestors(id);
  const bc=document.getElementById('sp-breadcrumb');
  bc.innerHTML=ancestors.map(a=>`<span class="sp-bc-item" onclick="openPanel(${a.id})">${a.name}</span><span class="sp-bc-sep">›</span>`).join('')+`<span style="font-size:12px;color:var(--text2)">${t.name}</span>`;

  // populate project select
  const sel=document.getElementById('sp-proj');
  sel.innerHTML=projects.map(p=>`<option value="${p.id}">${p.icon} ${p.name}</option>`).join('');

  document.getElementById('sp-title').value=t.name;
  sel.value=t.projId;
  document.getElementById('sp-status').value=t.status;
  document.getElementById('sp-tag').value=t.tag;
  document.getElementById('sp-priority').value=t.priority;
  document.getElementById('sp-due').value=t.due||'';
  document.getElementById('sp-time').value=t.plannedTime||0;
  document.getElementById('sp-starthour').value=t.startHour??'';
  document.getElementById('sp-memo').value=t.memo||'';
  document.getElementById('sp-btn-del').style.visibility='visible';

  // subtasks
  renderPanelSubtasks(id);

  document.getElementById('sp-overlay').classList.add('open');
  document.getElementById('side-panel').classList.add('open');
}

function renderPanelSubtasks(id){
  const children=childTasks(id);
  const done=children.filter(c=>c.status==='done').length;
  const pct=children.length?Math.round(done/children.length*100):0;
  document.getElementById('sp-prog-text').textContent=children.length?`${done}/${children.length} 완료`:'';
  document.getElementById('sp-prog-fill').style.width=pct+'%';
  document.getElementById('sp-subtask-list').innerHTML=children.map(c=>`
    <div class="sp-sub-row" onclick="openPanel(${c.id})">
      <div class="chk ${c.status==='done'?'done':''}" onclick="quickToggle(${c.id},event)" style="width:14px;height:14px;font-size:9px">✓</div>
      <span class="sp-sub-name ${c.status==='done'?'done':''}">${c.name}</span>
      ${c.due?`<span class="sp-sub-date">${fmtDate(c.due)}</span>`:''}
      <span class="sp-sub-chevron">›</span>
    </div>`).join('');
}

function closeSidePanel(){
  document.getElementById('sp-overlay').classList.remove('open');
  document.getElementById('side-panel').classList.remove('open');
  panelTaskId=null;
}

function autoSavePanel(){if(panelTaskId!==null)savePanel(true);}
function savePanel(silent=false){
  if(panelTaskId===null)return;
  const t=tasks.find(t=>t.id===panelTaskId);if(!t)return;
  t.name=document.getElementById('sp-title').value.trim()||t.name;
  t.projId=parseInt(document.getElementById('sp-proj').value);
  t.status=document.getElementById('sp-status').value;
  t.tag=document.getElementById('sp-tag').value;
  t.priority=document.getElementById('sp-priority').value;
  t.due=document.getElementById('sp-due').value;
  t.plannedTime=parseInt(document.getElementById('sp-time').value)||0;
  const sh=document.getElementById('sp-starthour').value;
  t.startHour=sh===''?undefined:parseInt(sh);
  t.memo=document.getElementById('sp-memo').value;
  saveLocal();scheduleSave();syncTaskToGcal(t);
  if(!silent){showToast('저장됐어요');renderAll();}else{renderAll();}
}

function addSubTask(){
  if(panelTaskId===null)return;
  const parent=tasks.find(t=>t.id===panelTaskId);
  const newTask={id:nextTaskId++,name:'새 하위 작업',parentId:panelTaskId,projId:parent.projId,memo:'',status:'todo',tag:parent.tag||'etc',priority:'mid',due:'',plannedTime:0};
  tasks.push(newTask);
  saveLocal();scheduleSave();
  renderPanelSubtasks(panelTaskId);
  renderAll();
  // open the new subtask
  setTimeout(()=>openPanel(newTask.id),100);
}

let _confirmResolve=null;
function showConfirm(msg){
  return new Promise(resolve=>{
    _confirmResolve=resolve;
    document.getElementById('confirm-msg').textContent=msg;
    document.getElementById('confirm-box').classList.remove('hide');
  });
}
function confirmResolve(val){
  document.getElementById('confirm-box').classList.add('hide');
  if(_confirmResolve){_confirmResolve(val);_confirmResolve=null;}
}
function deleteTaskFromPanel(){
  if(panelTaskId===null)return;
  showConfirm('이 작업과 하위 작업을 모두 삭제할까요?').then(ok=>{
    if(!ok)return;
    const toDelete=[panelTaskId,...allDescendants(panelTaskId).map(t=>t.id)];
    tasks=tasks.filter(t=>!toDelete.includes(t.id));
    saveLocal();scheduleSave();closeSidePanel();renderAll();
  });
}

function openNewTask(){
  const newTask={id:nextTaskId++,name:'새 작업',parentId:null,projId:selProjId||projects[0]?.id||1,memo:'',status:'todo',tag:'etc',priority:'mid',due:todayStr(),plannedTime:0};
  tasks.unshift(newTask);
  syncTaskToGcal(newTask);
  saveLocal();scheduleSave();renderAll();
  openPanel(newTask.id);
}

// ── Project Modal ─────────────────────────────────────────
function buildIconGrid(){document.getElementById('icon-grid').innerHTML=ICONS.map(ic=>`<button class="icon-opt ${ic===selIcon?'sel':''}" onclick="selectIcon('${ic}')">${ic}</button>`).join('');}
function buildColorGrid(){document.getElementById('color-grid').innerHTML=COLORS.map(c=>`<div class="color-opt ${c===selColor?'sel':''}" style="background:${c}" onclick="selectColor('${c}')"></div>`).join('');}
function selectIcon(ic){selIcon=ic;buildIconGrid();}
function selectColor(c){selColor=c;buildColorGrid();}
function openProjModal(id){
  editingProjId=id;
  if(id===null){document.getElementById('proj-modal-title').textContent='새 프로젝트';document.getElementById('pf-name').value='';document.getElementById('pf-desc').value='';selIcon=ICONS[0];selColor=COLORS[0];document.getElementById('proj-btn-del').style.visibility='hidden';}
  else{const p=projects.find(p=>p.id===id);document.getElementById('proj-modal-title').textContent='프로젝트 수정';document.getElementById('pf-name').value=p.name;document.getElementById('pf-desc').value=p.desc||'';selIcon=p.icon;selColor=p.color;document.getElementById('proj-btn-del').style.visibility='visible';}
  buildIconGrid();buildColorGrid();
  document.getElementById('proj-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('pf-name').focus(),50);
}
function closeProjModal(){document.getElementById('proj-overlay').classList.remove('open');editingProjId=null;}
function closeProjOverlay(e){if(e.target===document.getElementById('proj-overlay'))closeProjModal();}
function saveProject(){
  const name=document.getElementById('pf-name').value.trim();if(!name)return;
  const data={name,icon:selIcon,color:selColor,desc:document.getElementById('pf-desc').value.trim()};
  if(editingProjId===null)projects.push({id:nextProjId++,...data});
  else{const idx=projects.findIndex(p=>p.id===editingProjId);if(idx>-1)projects[idx]={...projects[idx],...data};}
  saveLocal();scheduleSave();closeProjModal();renderAll();
}
function deleteProject(){
  showConfirm('프로젝트와 모든 작업을 삭제할까요?').then(ok=>{
    if(!ok)return;
    tasks=tasks.filter(t=>t.projId!==editingProjId);
    projects=projects.filter(p=>p.id!==editingProjId);
    if(selProjId===editingProjId)selProjId=null;
    saveLocal();scheduleSave();closeProjModal();renderAll();
  });
}
